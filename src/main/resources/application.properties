# ═══════════════════════════════════════
#  VoteEase — Application Configuration
# ═══════════════════════════════════════

server.port=3000

# ── MySQL Database ──
# IMPORTANT: Update password below to match YOUR MySQL root password
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/voteease?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sahana@29}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Schema Initialization ──
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.continue-on-error=true

# ── Session ──
server.servlet.session.timeout=24h
server.servlet.session.cookie.http-only=true

# ── Jackson JSON ──
spring.jackson.default-property-inclusion=non_null
